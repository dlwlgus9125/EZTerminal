name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Single Windows job: the packaged-exe smoke (Fuses + asar + ConPTY) is
    # Windows-first and Electron e2e needs a desktop session, which Windows runners have.
    # Pinned to windows-2022 (VS2022): windows-latest now ships VS18, which the `cap`
    # dependency's @electron/node-gyp (v10) can't parse ("unknown version undefined")
    # → node-gyp finds no C++ toolchain and `pnpm install` dies compiling cap.
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      EZTERMINAL_BUILD_SHA: ${{ github.sha }}
      VITE_BUILD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      # pnpm.onlyBuiltDependencies in package.json allowlists electron /
      # node-pty / cap build scripts. cap compiles from source
      # (node-gyp) against its bundled WinPcap SDK; .npmrc clang=false routes it to
      # MSVC. wpcap.dll (Npcap) is only needed at runtime for live capture, not to build.
      - run: pnpm install --frozen-lockfile

      - name: Export and verify version contract
        shell: pwsh
        run: |
          pnpm verify:version
          if ($LASTEXITCODE -ne 0) { throw 'Version contract verification failed.' }
          $contract = Get-Content release/version.json -Raw | ConvertFrom-Json
          $rootVersion = [string]$contract.version
          $androidVersionCode = [int]$contract.androidVersionCode
          "EZTERMINAL_VERSION=$rootVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANDROID_VERSION_CODE=$androidVersionCode" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANDROID_DEBUG_ARTIFACT_NAME=android-debug-$rootVersion-vc$androidVersionCode" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Desktop typecheck
        run: pnpm typecheck
      - name: Desktop lint
        run: pnpm lint
      - name: Desktop unit tests
        run: pnpm test
      - name: Dependency vulnerability gate
        run: |
          pnpm audit --prod --audit-level=low
          pnpm audit --audit-level=low

      - name: Mobile lint
        working-directory: mobile
        run: pnpm lint
      - name: Mobile typecheck
        working-directory: mobile
        run: pnpm typecheck
      - name: Mobile unit tests
        working-directory: mobile
        run: pnpm test
      - name: Mobile production build
        working-directory: mobile
        run: pnpm build:release

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: pnpm cap:sync
      - name: Verify Capacitor Android files are current
        shell: pwsh
        run: |
          $status = @(git status --porcelain --untracked-files=all -- mobile/android)
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not inspect the Android project after Capacitor sync.'
          }
          if ($status.Count -ne 0) {
            $status | ForEach-Object { Write-Host $_ }
            throw 'pnpm --dir mobile cap:sync changed tracked or untracked Android files. Commit the generated updates.'
          }
      - name: Android lint, unit tests, and debug artifacts
        working-directory: mobile/android
        run: .\gradlew.bat lintDebug testDebugUnitTest assembleDebug assembleDebugAndroidTest --no-daemon --stacktrace
      - name: Verify Android dependency locks and metadata are stable
        shell: pwsh
        run: |
          $status = @(git status --porcelain --untracked-files=all -- mobile/android)
          if ($status.Count -ne 0) {
            $status | ForEach-Object { Write-Host $_ }
            throw 'Android build changed committed dependency locks or verification metadata.'
          }
      - name: Verify debug APK contract and signature
        shell: pwsh
        run: |
          ./mobile/android/scripts/verify-apk.ps1 `
            -ApkPath mobile/android/app/build/outputs/apk/debug/app-debug.apk `
            -MetadataPath mobile/android/app/build/outputs/apk/debug/output-metadata.json `
            -ExpectedVersionName $env:EZTERMINAL_VERSION `
            -ExpectedVersionCode ([int]$env:ANDROID_VERSION_CODE) `
            -RequireSignature
      - name: Upload Android debug and instrumentation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.ANDROID_DEBUG_ARTIFACT_NAME }}
          path: |
            mobile/android/app/build/outputs/apk/debug/app-debug.apk
            mobile/android/app/build/outputs/apk/debug/output-metadata.json
            mobile/android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            mobile/android/app/build/reports/lint-results-debug.html
            mobile/android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: error
          retention-days: 7

      - name: Install Chromium for Storybook checks
        run: pnpm exec playwright install chromium
      - name: Storybook interaction and accessibility tests
        run: pnpm test:storybook
      - name: Storybook production build
        run: pnpm storybook:build
      - name: Storybook visual regression and axe checks
        run: pnpm test:visual
      # Fresh checkout has no .vite, so the e2e global-setup builds the real bundles
      # (locally a stale .vite is silently reused — CI closes that gap by construction).
      - name: Electron end-to-end tests
        run: pnpm e2e
      - name: Package Electron app
        run: pnpm package
      - name: Verify packaged native modules
        run: pnpm guard:native
      - name: Verify packaged packet capture native module
        run: pnpm guard:native-cap
      - name: Verify PTY routing invariants
        run: pnpm guard:pty-routing
      # global-setup re-runs guard:native and reuses the exe packaged above.
      - name: Packaged app smoke tests
        run: pnpm test:e2e:packaged

      - name: Generate dependency SBOM
        run: pnpm sbom -- --output artifacts/sbom.cdx.json
      - name: Upload dependency SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dependency-sbom
          path: artifacts/sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  rust-quality:
    name: Native remote host quality
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Format, test, and lint native host
        working-directory: native/remote-host
        run: |
          cargo fmt --all -- --check
          cargo test --locked --all-targets
          cargo clippy --locked --all-targets -- -D warnings
      - name: Install pinned Rust supply-chain tools
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-deny --version 0.20.2 --locked
      - name: Audit native dependency graph
        working-directory: native/remote-host
        run: |
          cargo audit --deny warnings
          cargo deny check

  android-instrumentation:
    name: Android instrumentation (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VITE_BUILD_SHA: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 35]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # The emulator is unstable under full software emulation. GitHub's Linux
      # runners expose KVM, but its device permissions must be enabled first.
      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      # Resolve the Capacitor workspace without lifecycle scripts: pnpm's
      # workspace install can otherwise compile the root desktop `cap` addon
      # on Linux even under a mobile filter.
      - name: Install mobile dependencies
        run: pnpm install --filter ezterminal-mobile... --frozen-lockfile --ignore-scripts

      - name: Build production mobile assets
        working-directory: mobile
        run: pnpm build:release

      - name: Sync Capacitor Android project
        working-directory: mobile
        run: pnpm cap:sync

      - name: Verify generated Android project is current
        shell: bash
        run: |
          status="$(git status --porcelain --untracked-files=all -- mobile/android)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            echo 'Capacitor sync changed Android source. Commit generated updates.' >&2
            exit 1
          fi

      - name: Run device-side contract tests
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: cd mobile/android && ./gradlew connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload Android instrumentation report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-instrumentation-api-${{ matrix.api-level }}
          path: |
            mobile/android/app/build/reports/androidTests/connected/
            mobile/android/app/build/outputs/androidTest-results/
          if-no-files-found: ignore
          retention-days: 7
