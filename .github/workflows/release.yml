name: Release

# Tag-driven release train (B-M2): full verification -> signed (if secret
# present) Squirrel artifacts -> DRAFT GitHub Release a human publishes.
# Requires a GitHub remote; the Squirrel auto-update feed (B-M4) additionally
# requires the repo to be PUBLIC (user decision pending).
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 50
    permissions:
      contents: write # create the draft release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$v" -ne "${{ github.ref_name }}") {
            throw "tag ${{ github.ref_name }} does not match package.json version v$v"
          }

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm e2e

      # Optional code signing (B-M3): store the .pfx as base64 in
      # WINDOWS_SIGN_PFX_BASE64 (+ WINDOWS_SIGN_CERT_PASSWORD). Absent secret ->
      # unsigned build, same as local dev (docs/release/signing.md).
      - name: Materialize signing cert (no-op without secret)
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
        run: |
          if ($env:PFX_B64) {
            $path = Join-Path $env:RUNNER_TEMP 'sign.pfx'
            [IO.File]::WriteAllBytes($path, [Convert]::FromBase64String($env:PFX_B64))
            "WINDOWS_SIGN_CERT_FILE=$path" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host 'Signing enabled for this release build.'
          } else {
            Write-Host 'No signing secret - producing an UNSIGNED release build.'
          }

      # make runs the full package internally, so the packaged smoke below
      # reuses (and therefore tests) the exact exe that ships — signed when the
      # secret is present.
      - run: pnpm make
        env:
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
      - run: pnpm guard:native
      - run: pnpm test:e2e:packaged

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            out/make/squirrel.windows/x64/EZTerminal-Setup.exe
            out/make/squirrel.windows/x64/RELEASES
            out/make/squirrel.windows/x64/*.nupkg

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
