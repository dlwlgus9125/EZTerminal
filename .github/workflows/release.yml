name: Release

# Both entry points build from the exact checked-out SHA. A v* tag creates a
# draft release; workflow_dispatch only produces reviewable RC artifacts.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  rust-quality:
    name: Release native remote host quality
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Native quality and supply-chain gate
        working-directory: native/remote-host
        run: |
          cargo fmt --all -- --check
          if ($LASTEXITCODE -ne 0) { throw 'cargo fmt failed.' }
          cargo test --locked --all-targets
          if ($LASTEXITCODE -ne 0) { throw 'cargo test failed.' }
          cargo clippy --locked --all-targets -- -D warnings
          if ($LASTEXITCODE -ne 0) { throw 'cargo clippy failed.' }
          cargo install cargo-audit --version 0.22.2 --locked
          if ($LASTEXITCODE -ne 0) { throw 'cargo-audit installation failed.' }
          cargo install cargo-deny --version 0.20.2 --locked
          if ($LASTEXITCODE -ne 0) { throw 'cargo-deny installation failed.' }
          cargo audit --deny warnings
          if ($LASTEXITCODE -ne 0) { throw 'cargo audit failed.' }
          cargo deny check
          if ($LASTEXITCODE -ne 0) { throw 'cargo deny failed.' }

  android-instrumentation:
    name: Release Android instrumentation (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VITE_BUILD_SHA: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 35]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Keep release instrumentation on a responsive, hardware-accelerated AVD.
      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      # The mobile filter can still expose root lifecycle scripts; this lane
      # needs JS assets only and must not compile the desktop `cap` addon.
      - name: Install mobile dependencies
        run: pnpm install --filter ezterminal-mobile... --frozen-lockfile --ignore-scripts
      - name: Build and sync production mobile assets
        shell: bash
        run: |
          pnpm --dir mobile build:release
          pnpm --dir mobile cap:sync
          status="$(git status --porcelain --untracked-files=all -- mobile/android)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            exit 1
          fi
      - name: Run device-side release contracts
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: cd mobile/android && ./gradlew connectedDebugAndroidTest --no-daemon --stacktrace

  release:
    needs: [android-instrumentation, rust-quality]
    runs-on: windows-2022
    timeout-minutes: 120
    environment: release
    permissions:
      contents: write
    env:
      EZTERMINAL_PLAYWRIGHT_RETRIES: "0"
      EZTERMINAL_BUILD_SHA: ${{ github.sha }}
      VITE_BUILD_SHA: ${{ github.sha }}
      EZTERMINAL_LOCAL_RC_APPROVED_SHA: ${{ vars.EZTERMINAL_LOCAL_RC_APPROVED_SHA }}
      EZTERMINAL_LOCAL_RC_REPORT_SHA256: ${{ vars.EZTERMINAL_LOCAL_RC_REPORT_SHA256 }}
      EZTERMINAL_LOCAL_RC_REPORT_BASE64: ${{ secrets.EZTERMINAL_LOCAL_RC_REPORT_BASE64 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - run: pnpm install --frozen-lockfile

      - name: Export and verify release identity
        shell: pwsh
        run: |
          pnpm verify:version
          if ($LASTEXITCODE -ne 0) { throw 'Version contract verification failed.' }
          $contract = Get-Content release/version.json -Raw | ConvertFrom-Json
          $rootVersion = [string]$contract.version
          $androidCode = [int]$contract.androidVersionCode
          $repositoryCert = ((Get-Content mobile/android/signing-certificate.sha256 -Raw) -replace '[^0-9A-Fa-f]', '').ToUpperInvariant()
          if ($repositoryCert -notmatch '^[0-9A-F]{64}$') {
            throw 'The committed Android release certificate fingerprint is UNCONFIGURED or invalid. Generate the long-term key and commit its public SHA-256 fingerprint before release.'
          }
          if ('${{ github.event_name }}' -eq 'push' -and "v$rootVersion" -ne '${{ github.ref_name }}') {
            throw "Tag ${{ github.ref_name }} does not match v$rootVersion."
          }
          $head = (git rev-parse HEAD).Trim()
          if ($head -ne '${{ github.sha }}') {
            throw "Checkout SHA $head differs from workflow SHA ${{ github.sha }}."
          }
          if ($env:EZTERMINAL_LOCAL_RC_APPROVED_SHA -ne $head) {
            throw 'Protected release Environment does not approve this exact SHA. Run the local RC gate and update EZTERMINAL_LOCAL_RC_APPROVED_SHA.'
          }
          $rcReportHash = ($env:EZTERMINAL_LOCAL_RC_REPORT_SHA256 -replace '[^0-9A-Fa-f]', '').ToLowerInvariant()
          if ($rcReportHash -notmatch '^[0-9a-f]{64}$') {
            throw 'EZTERMINAL_LOCAL_RC_REPORT_SHA256 must be a 64-digit SHA-256 from the approved local RC report.'
          }
          if ([string]::IsNullOrWhiteSpace($env:EZTERMINAL_LOCAL_RC_REPORT_BASE64)) {
            throw 'Protected release Environment must provide EZTERMINAL_LOCAL_RC_REPORT_BASE64.'
          }
          try {
            $rcReportBytes = [Convert]::FromBase64String($env:EZTERMINAL_LOCAL_RC_REPORT_BASE64)
          } catch {
            throw 'EZTERMINAL_LOCAL_RC_REPORT_BASE64 is not valid base64.'
          }
          $rcReportPath = Join-Path $env:RUNNER_TEMP 'local-rc-report.json'
          [IO.File]::WriteAllBytes($rcReportPath, $rcReportBytes)
          $actualRcReportHash = (Get-FileHash -LiteralPath $rcReportPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualRcReportHash -ne $rcReportHash) {
            throw "Local RC report hash mismatch: expected $rcReportHash, got $actualRcReportHash."
          }
          try {
            $rcReport = Get-Content -LiteralPath $rcReportPath -Raw | ConvertFrom-Json
          } catch {
            throw 'Protected local RC report is not valid JSON.'
          }
          if ([int]$rcReport.schemaVersion -ne 1 -or [string]$rcReport.appVersion -ne $rootVersion) {
            throw 'Local RC report schema/app version does not match this release.'
          }
          if (
            [string]$rcReport.buildSha -ne $head -or
            [int]$rcReport.playwrightRetries -ne 0 -or
            [int]$rcReport.mobileConnectionAttemptsPerScenario -ne 1 -or
            [int]$rcReport.mobileSocketAttemptsBeforeInitialAuth -ne 1 -or
            [string]$rcReport.mobileTransport -ne 'adb-reverse-loopback' -or
            [int]$rcReport.mobileRemotePort -ne 17420 -or
            [string]$rcReport.emulatorBootMode -ne 'cold-no-snapshot'
          ) {
            throw 'Local RC report is not bound to this exact zero-retry, cold-boot, single-connect release commit.'
          }
          $devices = @($rcReport.devices)
          $api29 = @($devices | Where-Object { $_.status -eq 'passed' -and $_.avd -and [int]$_.api -eq 29 })
          $api35 = @($devices | Where-Object { $_.status -eq 'passed' -and $_.avd -and [int]$_.api -eq 35 })
          if ($api29.Count -lt 1 -or $api35.Count -lt 1) {
            throw 'Local RC report lacks passing API 29 or API 35 emulator evidence.'
          }
          if ([string]$rcReport.validationPolicy -ne 'current-windows-host-and-api-29-35-emulators') {
            throw 'Local RC report does not use the approved current-host/emulator validation policy.'
          }
          $requiredFunctionalLimits = @(
            'Lock and UAC secure-desktop capture and input are not supported.',
            'Software SAS and Ctrl+Alt+Delete are not supported.',
            'GDI capture, OpenH264 encoding and SendInput injection remain in the normal-user transport.'
          )
          foreach ($limit in $requiredFunctionalLimits) {
            if (@($rcReport.knownFunctionalLimits) -notcontains $limit) {
              throw "Local RC report omits the required functional limit: $limit"
            }
          }
          $performance = $rcReport.desktopPerformance
          $performanceResults = @($performance.results)
          $performanceFailures = @($performanceResults | Where-Object {
            [double]$_.deltaPercent -gt 5 -or
            ($_.targeted -eq $true -and [double]$_.deltaPercent -gt -15)
          })
          $candidateMetrics = $performance.candidate.metrics
          $requiredPerformanceMetrics = @(
            'cancellationLatencyMs',
            'rows100kCompletionMs',
            'plainOutput1_1MiBCompletionMs',
            'plainOutput12MiBRetentionPressureMs'
          )
          $invalidPerformanceSamples = @($requiredPerformanceMetrics | Where-Object {
            $metric = $candidateMetrics.$_
            $null -eq $metric -or
            [int]$metric.warmupRuns -ne 5 -or
            @($metric.samples).Count -ne 25
          })
          $candidateProvenance = $performance.candidate.provenance
          $productProvenance = $candidateProvenance.product
          $harnessProvenance = $candidateProvenance.harness
          $launchArtifactPaths = @($productProvenance.launchArtifacts.files | ForEach-Object {
            [string]$_.path
          })
          $requiredLaunchArtifacts = @(
            'build/interpreter-process.js',
            'build/main.js',
            'build/packet-capture-host.js',
            'build/preload.js',
            'build/script-host.js',
            'renderer/main_window/index.html'
          )
          $missingLaunchArtifacts = @($requiredLaunchArtifacts | Where-Object {
            $launchArtifactPaths -notcontains $_
          })
          $invalidLaunchArtifacts = @($productProvenance.launchArtifacts.files | Where-Object {
            [string]$_.sha256 -notmatch '^[0-9a-f]{64}$' -or [int64]$_.bytes -lt 1
          })
          $reportedFixtures = @($harnessProvenance.fixtures)
          $largeFixture = @($reportedFixtures | Where-Object {
            [string]$_.id -eq 'largePlainOutput' -and
            [string]$_.path -eq 'e2e/fixtures/large-plain-output.js' -and
            [int64]$_.stdoutBytes -eq 1101119 -and
            [string]$_.stdoutSha256 -eq 'bbab0e75bbec8e2b80d281ab814a67d841e03167099d787a407d69a038ed717a' -and
            [string]$_.completionMarker -eq 'LARGE-OUTPUT-DONE'
          })
          $retentionFixture = @($reportedFixtures | Where-Object {
            [string]$_.id -eq 'retentionPressureOutput' -and
            [string]$_.path -eq 'e2e/fixtures/retention-pressure-output.js' -and
            [int64]$_.stdoutBytes -eq 12012025 -and
            [string]$_.stdoutSha256 -eq '8f4d6337d2637244a47991f82383f798e78b36a145b579c01c027b6a3bdeced7' -and
            [string]$_.completionMarker -eq 'RETENTION-PRESSURE-DONE'
          })
          $lockHash = (Get-FileHash pnpm-lock.yaml -Algorithm SHA256).Hash.ToLowerInvariant()
          $harnessHash = (
            Get-FileHash e2e/release-performance.spec.ts -Algorithm SHA256
          ).Hash.ToLowerInvariant()
          $largeFixtureHash = (
            Get-FileHash e2e/fixtures/large-plain-output.js -Algorithm SHA256
          ).Hash.ToLowerInvariant()
          $retentionFixtureHash = (
            Get-FileHash e2e/fixtures/retention-pressure-output.js -Algorithm SHA256
          ).Hash.ToLowerInvariant()
          $installedElectronVersion = [string](
            Get-Content node_modules/electron/package.json -Raw | ConvertFrom-Json
          ).version
          $installedPlaywrightVersion = [string](
            Get-Content node_modules/@playwright/test/package.json -Raw | ConvertFrom-Json
          ).version
          $releaseNodeVersion = (& node -p 'process.versions.node').Trim()
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not resolve the release build Node version.'
          }
          $performanceResultNames = @($performanceResults | ForEach-Object { [string]$_.name })
          $missingPerformanceComparisons = @($requiredPerformanceMetrics | Where-Object {
            $performanceResultNames -notcontains $_
          })
          $targetPerformanceResult = @($performanceResults | Where-Object {
            [string]$_.name -eq 'plainOutput12MiBRetentionPressureMs' -and $_.targeted -eq $true
          })
          $cancellationSamples = @(
            $candidateMetrics.cancellationLatencyMs.samples |
              ForEach-Object { [double]$_ } |
              Sort-Object
          )
          $cancellationP95 = if ($cancellationSamples.Count -eq 25) {
            $cancellationSamples[[Math]::Ceiling($cancellationSamples.Count * 0.95) - 1]
          } else {
            [double]::PositiveInfinity
          }
          $cancellationMax = if ($cancellationSamples.Count -gt 0) {
            ($cancellationSamples | Measure-Object -Maximum).Maximum
          } else {
            [double]::PositiveInfinity
          }
          if (
            [string]$performance.status -ne 'passed' -or
            [double]$performance.maxP95RegressionPercent -ne 5 -or
            [double]$performance.minTargetP95ImprovementPercent -ne 15 -or
            @($performance.targetMetrics) -notcontains 'plainOutput12MiBRetentionPressureMs' -or
            [int]$performance.schemaVersion -ne 2 -or
            [string]$performance.baselineBuildSha -notmatch '^[0-9a-f]{40}$' -or
            [string]$performance.candidateBuildSha -ne $head -or
            [string]$performance.baselineReportSha256 -notmatch '^[0-9a-f]{64}$' -or
            [string]$performance.candidateReportSha256 -notmatch '^[0-9a-f]{64}$' -or
            [int]$performance.candidate.schemaVersion -ne 2 -or
            [string]$performance.candidate.evidenceMode -ne 'release' -or
            [string]$performance.candidate.buildSha -ne $head -or
            [int]$performance.candidate.warmupRuns -ne 5 -or
            [int]$performance.candidate.measurementRuns -ne 25 -or
            (@($performance.candidate.metricOrder) -join ',') -ne (
              $requiredPerformanceMetrics -join ','
            ) -or
            [string]$productProvenance.name -ne 'EZTerminal' -or
            [string]$productProvenance.version -ne $rootVersion -or
            [int]$productProvenance.protocolVersion -ne [int]$contract.protocolVersion -or
            [string]$productProvenance.buildSha -ne $head -or
            [string]$productProvenance.source.gitHeadSha -ne $head -or
            $productProvenance.source.workingTreeDirty -ne $false -or
            [string]$harnessProvenance.source.gitHeadSha -ne $head -or
            $harnessProvenance.source.workingTreeDirty -ne $false -or
            [string]$productProvenance.lock.sha256 -ne $lockHash -or
            [string]$harnessProvenance.lock.sha256 -ne $lockHash -or
            [string]$harnessProvenance.spec.sha256 -ne $harnessHash -or
            [string]$productProvenance.runtime.electron -ne $installedElectronVersion -or
            [string]::IsNullOrWhiteSpace([string]$productProvenance.runtime.node) -or
            [string]$harnessProvenance.runner.node -ne $releaseNodeVersion -or
            [string]$harnessProvenance.runner.playwright -ne $installedPlaywrightVersion -or
            [string]$productProvenance.launchArtifacts.entry -ne 'build/main.js' -or
            $missingLaunchArtifacts.Count -ne 0 -or
            $invalidLaunchArtifacts.Count -ne 0 -or
            $reportedFixtures.Count -ne 2 -or
            $largeFixture.Count -ne 1 -or
            $retentionFixture.Count -ne 1 -or
            [string]$largeFixture[0].sha256 -ne $largeFixtureHash -or
            [string]$retentionFixture[0].sha256 -ne $retentionFixtureHash -or
            [string]$performance.candidate.environment.platform -ne 'win32' -or
            [string]$performance.candidate.environment.arch -ne 'x64' -or
            [string]::IsNullOrWhiteSpace([string]$performance.candidate.environment.osRelease) -or
            [string]::IsNullOrWhiteSpace([string]$performance.candidate.environment.cpuModel) -or
            [int]$performance.candidate.environment.logicalCpuCount -lt 1 -or
            [int]$performance.candidate.environment.totalMemoryGiB -lt 1 -or
            [string]$performance.candidate.environment.hostFingerprint.algorithm -ne
              'windows-machine-guid-sha256-v1' -or
            [string]$performance.candidate.environment.hostFingerprint.sha256 -notmatch
              '^[0-9a-f]{64}$' -or
            [string]$performance.candidate.environment.powerPlan.schemeGuid -notmatch
              '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$' -or
            [string]$performance.candidate.environment.powerPlan.powerSource -notmatch
              '^(ac|dc)$' -or
            [string]$performance.candidate.environment.powerPlan.effectivePowerMode -notmatch
              '^(battery-saver|better-battery|balanced|high-performance|max-performance)$' -or
            [string]$performance.candidate.environment.powerPlan.baseSettingsSha256 -notmatch
              '^[0-9a-f]{64}$' -or
            [string]$performance.candidate.environment.powerPlan.effectiveSettingsSha256 -notmatch
              '^[0-9a-f]{64}$' -or
            $invalidPerformanceSamples.Count -ne 0 -or
            $missingPerformanceComparisons.Count -ne 0 -or
            $targetPerformanceResult.Count -ne 1 -or
            [double]$cancellationP95 -gt 3000 -or
            [double]$cancellationMax -ge 5000 -or
            $performanceFailures.Count -ne 0
          ) {
            throw 'Local RC report lacks passing same-host desktop performance evidence.'
          }
          if (
            $rcReport.mobileSoak.status -ne 'passed' -or
            [string]$rcReport.mobileSoak.buildSha -ne $head -or
            [string]$rcReport.mobileSoak.appVersion -ne $rootVersion -or
            [int64]$rcReport.mobileSoak.durationMs -lt 1800000 -or
            [int]$rcReport.mobileSoak.sessionCount -ne 8 -or
            [int]$rcReport.mobileSoak.recoveryCycles -ne 20 -or
            $rcReport.mobileSoak.memoryPassed -ne $true -or
            $rcReport.mobileSoak.markerAuditPassed -ne $true -or
            $rcReport.mobileSoak.cleanupPassed -ne $true
          ) {
            throw 'Local RC report lacks a passing exact-SHA 8-session/20-recovery mobile soak.'
          }
          $dirty = @(git status --porcelain --untracked-files=all)
          if ($dirty.Count -ne 0) { throw "Release checkout is not clean: $($dirty -join ', ')" }
          "EZTERMINAL_VERSION=$rootVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANDROID_VERSION_CODE=$androidCode" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANDROID_REPOSITORY_CERT_SHA256=$repositoryCert" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "LOCAL_RC_REPORT_PATH=$rcReportPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_ARTIFACT_NAME=EZTerminal-$rootVersion-$($head.Substring(0, 8))" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Desktop typecheck
        run: pnpm typecheck
      - name: Desktop lint
        run: pnpm lint
      - name: Desktop unit tests (three consecutive zero-retry runs)
        shell: pwsh
        run: |
          1..3 | ForEach-Object {
            Write-Host "Desktop unit gate run $_/3"
            pnpm test
            if ($LASTEXITCODE -ne 0) { throw "Desktop unit gate failed on run $_." }
          }
      - name: Dependency vulnerability gate
        run: |
          pnpm audit --prod --audit-level=low
          pnpm audit --audit-level=low

      - name: Mobile lint
        working-directory: mobile
        run: pnpm lint
      - name: Mobile typecheck
        working-directory: mobile
        run: pnpm typecheck
      - name: Mobile unit tests (three consecutive zero-retry runs)
        working-directory: mobile
        shell: pwsh
        run: |
          1..3 | ForEach-Object {
            Write-Host "Mobile unit gate run $_/3"
            pnpm test
            if ($LASTEXITCODE -ne 0) { throw "Mobile unit gate failed on run $_." }
          }
      - name: Mobile production build and marker gate
        working-directory: mobile
        run: pnpm build:release
      - name: Sync Capacitor Android project
        working-directory: mobile
        run: pnpm cap:sync
      - name: Verify Capacitor Android files are current
        shell: pwsh
        run: |
          $status = @(git status --porcelain --untracked-files=all -- mobile/android)
          if ($status.Count -ne 0) {
            $status | ForEach-Object { Write-Host $_ }
            throw 'Capacitor sync changed Android source. Commit generated updates.'
          }
      - name: Android release lint and unit tests
        working-directory: mobile/android
        run: .\gradlew.bat lintRelease testReleaseUnitTest --no-daemon --stacktrace

      - name: Install Chromium for Storybook checks
        run: pnpm exec playwright install chromium
      - name: Storybook interaction and accessibility tests
        run: pnpm test:storybook
      - name: Storybook production build
        run: pnpm storybook:build
      - name: Storybook visual regression and axe checks
        run: pnpm test:visual
      - name: Build native remote host for desktop E2E
        run: pnpm build:remote-host
      - name: Desktop end-to-end tests
        run: pnpm e2e

      # EZTerminal 1.0.x intentionally ships unsigned on Windows. The staging
      # script below rejects anything except explicit Authenticode NotSigned.
      - name: Build unsigned Windows release
        run: pnpm make
      - name: Verify packaged native modules
        run: pnpm guard:native
      - name: Verify packaged packet capture native module
        run: pnpm guard:native-cap
      - name: Verify PTY routing invariants
        run: pnpm guard:pty-routing
      - name: Packaged app smoke tests
        run: pnpm test:e2e:packaged

      - name: Materialize protected Android release keystore
        shell: pwsh
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          $required = @(
            $env:KEYSTORE_B64,
            $env:KEYSTORE_PASSWORD,
            $env:KEY_ALIAS,
            $env:KEY_PASSWORD,
            $env:CERT_SHA256
          )
          if ($required.Where({ [string]::IsNullOrWhiteSpace($_) }).Count -ne 0) {
            throw 'All five Android release signing secrets are required.'
          }
          $cert = ($env:CERT_SHA256 -replace '[^0-9A-Fa-f]', '').ToUpperInvariant()
          if ($cert -notmatch '^[0-9A-F]{64}$') {
            throw 'ANDROID_SIGNING_CERT_SHA256 must contain exactly 64 hexadecimal digits.'
          }
          if ($cert -ne $env:ANDROID_REPOSITORY_CERT_SHA256) {
            throw 'Protected Android certificate fingerprint differs from the fingerprint committed in signing-certificate.sha256.'
          }
          $path = Join-Path $env:RUNNER_TEMP 'ezterminal-android-release.keystore'
          try {
            [IO.File]::WriteAllBytes($path, [Convert]::FromBase64String($env:KEYSTORE_B64))
          } catch {
            throw 'ANDROID_KEYSTORE_BASE64 is not valid base64.'
          }
          "ANDROID_KEYSTORE_PATH=$path" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANDROID_SIGNING_CERT_SHA256=$cert" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host 'Protected Android release keystore materialized in RUNNER_TEMP.'

      - name: Assemble signed Android release APK
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: .\gradlew.bat assembleRelease --no-daemon --stacktrace

      - name: Verify and stage exact-SHA release artifacts
        shell: pwsh
        run: |
          ./scripts/stage-release-artifacts.ps1 `
            -Version $env:EZTERMINAL_VERSION `
            -AndroidVersionCode ([int]$env:ANDROID_VERSION_CODE) `
            -AndroidApkPath mobile/android/app/build/outputs/apk/release/app-release.apk `
            -AndroidMetadataPath mobile/android/app/build/outputs/apk/release/output-metadata.json `
            -AndroidCertSha256 $env:ANDROID_REPOSITORY_CERT_SHA256 `
            -LocalRcReportSha256 $env:EZTERMINAL_LOCAL_RC_REPORT_SHA256 `
            -LocalRcReportPath $env:LOCAL_RC_REPORT_PATH `
            -ExpectedCommit '${{ github.sha }}' `
            -ExpectedWindowsSignature NotSigned `
            -ProtocolVersion 2 `
            -RequireCleanTree

      - name: Upload unified release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.RELEASE_ARTIFACT_NAME }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

      - name: Create draft GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          generate_release_notes: true
          body_path: docs/release/release-notes-1.0.4.md
          fail_on_unmatched_files: true
          files: release-assets/*

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove temporary signing material
        if: always()
        shell: pwsh
        run: |
          if ($env:ANDROID_KEYSTORE_PATH -and (Test-Path -LiteralPath $env:ANDROID_KEYSTORE_PATH)) {
            Remove-Item -LiteralPath $env:ANDROID_KEYSTORE_PATH -Force
          }
